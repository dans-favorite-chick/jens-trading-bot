[pytest]
# Restrict test discovery to tests/ only.
#
# tools/ contains CLI utilities and MANUAL VERIFICATION scripts. Many
# of them start with `test_*` but actually submit LIVE OIF orders to
# NT8 (e.g. tools/verification_2026_04_18/test_01_market_ack.py). Do
# NOT auto-discover them — pytest would unintentionally spam NT8 with
# DAY-TIF MANTEST_* orders.
#
# The one legitimate pytest unit-test file in tools/verification_...
# (test_p5b_oif_correctness.py — pure OIF string assertions, no I/O)
# is discovered because conftest.py in that folder adds it explicitly
# if/when needed. Run verification scripts by name: `python
# tools/verification_2026_04_18/test_01_market_ack.py`.
testpaths = tests
norecursedirs = tools archive .claude Phoenix*Project mnq_trading_bot memory
